name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-jvm-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew spotlessCheck :picker:compileKotlinJvm :picker:compileKotlinWasmJs :picker:compileDebugKotlinAndroid :picker:jvmTest :sample:composeApp:compileKotlinJvm :sample:composeApp:compileKotlinWasmJs :sample:composeApp:assembleDebug --no-daemon --stacktrace

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :picker:compileKotlinIosSimulatorArm64 :picker:compileKotlinIosArm64 :picker:compileKotlinIosX64 :sample:composeApp:compileKotlinIosSimulatorArm64 --no-daemon --stacktrace
